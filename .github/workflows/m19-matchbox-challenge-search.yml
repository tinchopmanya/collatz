name: M19 Matchbox challenge search

on:
  workflow_dispatch:
    inputs:
      challenge:
        description: "Challenge to run through Matchbox"
        required: true
        default: "both"
        type: choice
        options:
          - S1
          - S2
          - both
      matchbox_command:
        description: "Matchbox command prefix after setup"
        required: true
        default: "matchbox2015"
        type: string
      matchbox_args:
        description: "Extra Matchbox args, one shell string, before input file"
        required: false
        default: ""
        type: string
      binary_archive_url:
        description: "Optional tar.gz/zip URL containing matchbox2015 or matchbox"
        required: false
        default: ""
        type: string
      experimental_build:
        description: "Try building old jwaldmann/matchbox from source if no binary URL is provided"
        required: true
        default: false
        type: boolean
      wall_timeout:
        description: "Outer wall timeout per challenge in seconds"
        required: true
        default: "180"
        type: string
      ghc_version:
        description: "Pinned GHC version when experimental_build=true"
        required: true
        default: "8.10.7"
        type: string
      cabal_version:
        description: "Pinned cabal-install version when experimental_build=true"
        required: true
        default: "3.10.3.0"
        type: string
      index_state:
        description: "Pinned Hackage index-state when experimental_build=true"
        required: true
        default: "2021-09-01T00:00:00Z"
        type: string
      matchbox_ref:
        description: "jwaldmann/matchbox commit/ref when experimental_build=true"
        required: true
        default: "3b219db26dfb5ff9dd8777dcebabdd4e2a9427a4"
        type: string
      build_boolector_c:
        description: "Build and install Boolector C library from source when experimental_build=true"
        required: true
        default: true
        type: boolean
      boolector_ref:
        description: "Boolector tag/ref used when build_boolector_c=true"
        required: true
        default: "3.2.4"
        type: string
      patch_haskell_boolector:
        description: "Use a local minimal patch for Hackage boolector-0.0.0.13 on newer GHC"
        required: true
        default: true
        type: boolean

jobs:
  matchbox:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Install baseline dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bash curl unzip tar time python3 glpk-utils minisat \
            build-essential git ca-certificates pkg-config cmake \
            libgmp-dev libglpk-dev zlib1g-dev boolector
          dpkg -L boolector | grep -E 'boolector\.(h|a|so)' || true

      - name: Build and install Boolector C library
        if: inputs.experimental_build == true && inputs.binary_archive_url == '' && inputs.build_boolector_c == true
        run: |
          set -euxo pipefail
          rm -rf /tmp/m19-boolector-src
          git clone --depth 1 --branch "${{ inputs.boolector_ref }}" https://github.com/Boolector/boolector.git /tmp/m19-boolector-src
          cd /tmp/m19-boolector-src
          git rev-parse HEAD
          ./contrib/setup-lingeling.sh
          ./contrib/setup-btor2tools.sh
          ./configure.sh --prefix /usr/local --shared --only-lingeling --no-testing
          cmake --build build --parallel "$(nproc)"
          sudo cmake --install build
          sudo ldconfig
          test -f /usr/local/include/boolector/boolector.h
          test -e /usr/local/lib/libboolector.so
          {
            echo "C_INCLUDE_PATH=/usr/local/include/boolector:${C_INCLUDE_PATH:-}"
            echo "LIBRARY_PATH=/usr/local/lib:${LIBRARY_PATH:-}"
            echo "LD_LIBRARY_PATH=/usr/local/lib:${LD_LIBRARY_PATH:-}"
          } >> "$GITHUB_ENV"
          cat > /tmp/m19-boolector-smoke.c <<'EOF'
          #include "boolector.h"
          int main(void) {
            Btor *btor = boolector_new();
            boolector_delete(btor);
            return 0;
          }
          EOF
          cc -I/usr/local/include/boolector /tmp/m19-boolector-smoke.c \
            -L/usr/local/lib -Wl,-rpath,/usr/local/lib -lboolector \
            -o /tmp/m19-boolector-smoke
          /tmp/m19-boolector-smoke
          /usr/local/bin/boolector --version || true

      - name: Restore experimental Matchbox cache
        if: inputs.experimental_build == true && inputs.binary_archive_url == ''
        uses: actions/cache@v4
        with:
          path: |
            /tmp/matchbox-install
            ~/.cabal
          key: m19-matchbox-${{ runner.os }}-${{ inputs.ghc_version }}-${{ inputs.matchbox_ref }}-v2

      - name: Setup pinned Haskell toolchain
        if: inputs.experimental_build == true && inputs.binary_archive_url == ''
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ inputs.ghc_version }}
          cabal-version: ${{ inputs.cabal_version }}
          cabal-update: true

      - name: Install Matchbox from optional binary archive
        if: inputs.binary_archive_url != ''
        run: |
          mkdir -p /tmp/matchbox-bin /tmp/matchbox-archive
          curl -L "${{ inputs.binary_archive_url }}" -o /tmp/matchbox-archive/matchbox-package
          if tar -tzf /tmp/matchbox-archive/matchbox-package >/dev/null 2>&1; then
            tar -xzf /tmp/matchbox-archive/matchbox-package -C /tmp/matchbox-bin
          else
            unzip -q /tmp/matchbox-archive/matchbox-package -d /tmp/matchbox-bin
          fi
          find /tmp/matchbox-bin -type f -name 'matchbox*' -exec chmod +x {} \;
          echo "/tmp/matchbox-bin" >> "$GITHUB_PATH"
          find /tmp/matchbox-bin -maxdepth 3 -type f -perm -111 -print

      - name: Try experimental source build
        if: inputs.experimental_build == true && inputs.binary_archive_url == ''
        continue-on-error: true
        run: |
          mkdir -p /tmp/matchbox-src /tmp/matchbox-install/bin
          git clone https://github.com/jwaldmann/matchbox.git /tmp/matchbox-src/matchbox
          cd /tmp/matchbox-src/matchbox
          git checkout "${{ inputs.matchbox_ref }}"
          cat > cabal.project.local <<'EOF'
          packages: .
          index-state: hackage.haskell.org ${{ inputs.index_state }}
          allow-newer: false
          EOF
          if [ "${{ inputs.patch_haskell_boolector }}" = "true" ]; then
            rm -rf /tmp/m19-haskell-boolector
            mkdir -p /tmp/m19-haskell-boolector
            cabal get boolector-0.0.0.13 --destdir=/tmp/m19-haskell-boolector
            python3 - <<'PY'
          from pathlib import Path

          path = Path("/tmp/m19-haskell-boolector/boolector-0.0.0.13/src/Boolector.hs")
          old = '    _ -> fail "BUG: should really have the sort in the cache"'
          new = '    _ -> error "BUG: should really have the sort in the cache"'
          text = path.read_text(encoding="utf-8")
          if old not in text:
              raise SystemExit("expected Hackage boolector fail line not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")

          project = Path("cabal.project.local")
          project_text = project.read_text(encoding="utf-8")
          needle = "packages: ."
          local_package = "/tmp/m19-haskell-boolector/boolector-0.0.0.13"
          if needle not in project_text:
              raise SystemExit("expected packages stanza not found in cabal.project.local")
          project.write_text(project_text.replace(needle, f"{needle} {local_package}", 1), encoding="utf-8")
          PY
            if grep -n 'fail "BUG: should really have the sort' /tmp/m19-haskell-boolector/boolector-0.0.0.13/src/Boolector.hs; then
              exit 1
            fi
            grep -n 'error "BUG: should really have the sort' /tmp/m19-haskell-boolector/boolector-0.0.0.13/src/Boolector.hs
          fi
          cat cabal.project.local
          ghc --version
          cabal --version
          cabal v2-build exe:matchbox2015 -w "$(command -v ghc)" --jobs=2 \
            --extra-include-dirs=/usr/local/include/boolector \
            --extra-lib-dirs=/usr/local/lib
          cp "$(cabal list-bin exe:matchbox2015)" /tmp/matchbox-install/bin/matchbox2015
          /tmp/matchbox-install/bin/matchbox2015 --help || true

      - name: Add experimental Matchbox cache to PATH
        if: inputs.experimental_build == true && inputs.binary_archive_url == ''
        run: |
          echo "/tmp/matchbox-install/bin" >> "$GITHUB_PATH"
          ls -la /tmp/matchbox-install/bin || true

      - name: Probe Matchbox command
        continue-on-error: true
        run: |
          ${{ inputs.matchbox_command }} --help || true
          command -v matchbox2015 || true
          command -v matchbox || true

      - name: Run Matchbox on selected challenge files
        shell: bash
        run: |
          challenge_args=()
          if [ "${{ inputs.challenge }}" = "S1" ] || [ "${{ inputs.challenge }}" = "both" ]; then
            challenge_args+=(--challenge-file reports/m19_rewriting_challenges/m19_collatz_S1_without_ff_end_to_0_end.tpdb)
          fi
          if [ "${{ inputs.challenge }}" = "S2" ] || [ "${{ inputs.challenge }}" = "both" ]; then
            challenge_args+=(--challenge-file reports/m19_rewriting_challenges/m19_collatz_S2_without_tf_end_to_end.tpdb)
          fi
          extra_args=()
          if [ -n "${{ inputs.matchbox_args }}" ]; then
            read -r -a extra_args <<< "${{ inputs.matchbox_args }}"
          fi
          py_args=()
          for arg in "${extra_args[@]}"; do
            py_args+=(--matchbox-arg "$arg")
          done
          python3 scripts/m19_run_matchbox_challenges.py \
            --matchbox-command "${{ inputs.matchbox_command }}" \
            "${py_args[@]}" \
            "${challenge_args[@]}" \
            --out-dir /tmp/m19_matchbox_challenges \
            --wall-timeout "${{ inputs.wall_timeout }}"

      - name: Upload Matchbox artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m19-matchbox-challenge-search-${{ inputs.challenge }}
          path: /tmp/m19_matchbox_challenges

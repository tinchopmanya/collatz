name: M19 rewriting reproduction

on:
  workflow_dispatch:

jobs:
  reproduce-zantema:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3 python3-venv

      - name: Clone rewriting-collatz at audited commit
        run: |
          git clone https://github.com/emreyolcu/rewriting-collatz.git /tmp/rewriting-collatz
          cd /tmp/rewriting-collatz
          git checkout 8a4dfda60f97a6d33ff0a24fdfa7a172d4bec340

      - name: Install Python dependencies
        run: |
          cd /tmp/rewriting-collatz
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "numpy>=1.19"

      - name: Build CaDiCaL
        run: |
          cd /tmp/rewriting-collatz
          mkdir -p tools
          git clone https://github.com/arminbiere/cadical.git tools/cadical
          cd tools/cadical
          git checkout 7b99c07f0bcab5824a5a3ce62c7066554017f641
          ./configure
          make -j2
          ln -sf "$PWD/build/cadical" /tmp/rewriting-collatz/cadical
          cd /tmp/rewriting-collatz
          ./cadical --version

      - name: Reproduce zantema relative termination proof
        run: |
          cd /tmp/rewriting-collatz
          . .venv/bin/activate
          python prover/main.py relative/zantema.srs -i natural -d 2 -rw 4 --printascii > zantema-reproduction.log 2>&1
          grep -q "QED" zantema-reproduction.log
          grep -q "Relatively top-terminating rules" zantema-reproduction.log

      - name: Upload reproduction log
        uses: actions/upload-artifact@v4
        with:
          name: m19-zantema-reproduction-log
          path: /tmp/rewriting-collatz/zantema-reproduction.log
